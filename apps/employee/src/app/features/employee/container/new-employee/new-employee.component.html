<div class="new-employee-container h-full max-w-3xl mx-auto max-h-[80vh] overflow-y-auto">
  <div class="bg-white rounded-lg shadow-sm p-6">
    <app-entity-form
      [data]="{}"
      [fields]="fields"
      [mode]="formMode"
      [standalone]="true"
      [readonly]="false"
      [showActions]="true"
      [formKey]="formInstanceKey"
      (submit)="onFormSubmit($event)"
      (cancel)="onFormCancel()"
    ></app-entity-form>
  </div>
</div>
