<div class="signin-container">
  <div class="signin-card">

    <!-- Header -->
    <div class="signin-header">
      <h2>Welcome Back</h2>
      <p>
        Sign in to your account to continue
      </p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="signin-form">

      <!-- Email -->
      <div class="form-group">
        <label>
          Email
        </label>

        <input
          type="email"
          formControlName="email"
          placeholder="Enter your email"
        />

        <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']"
           class="error-message">
          Email is required
        </p>

        <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']"
           class="error-message">
          Please enter a valid email
        </p>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>
          Password
        </label>

        <div style="position: relative;">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your password"
          />

          <button
            type="button"
            (click)="togglePasswordVisibility()"
            style="position: absolute; right: 12px; top: 12px; background: none; border: none; cursor: pointer;"
          >
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>

        <p *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']"
           class="error-message">
          Password is required
        </p>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center;">
          <input
            id="remember-me"
            name="remember-me"
            type="checkbox"
            style="margin-right: 8px;"
          />
          <label for="remember-me" style="color: #374151; font-size: 0.875rem;">
            Remember me
          </label>
        </div>

        <div style="font-size: 0.875rem;">
          <a href="#" style="color: #f97316; text-decoration: none; font-weight: 500;">
            Forgot your password?
          </a>
        </div>
      </div>

      <!-- Error banner -->
      <div *ngIf="errorMessage$ | async as errorMessage"
           class="error-message">
        {{ errorMessage }}
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loginForm.invalid || (loading$ | async)"
        class="submit-btn"
      >
        <span *ngIf="!(loading$ | async)">Sign In</span>
        <span *ngIf="loading$ | async">Signing in...</span>
      </button>

    </form>

    <!-- Sign up link -->
    <div class="signup-link">
      Don't have an account?
      <a
        (click)="navigateToSignup()"
        style="color: #f97316; text-decoration: none; font-weight: 500; cursor: pointer;"
      >
        Sign up
      </a>
    </div>

  </div>
</div>
